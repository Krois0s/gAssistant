<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic Console</title>
    <style>
        :root {
            --bg-color: #faf9f8;
            --panel-bg: #ffffff;
            --header-footer-bg: #f3f2f1;
            --text-color: #323130;
            --text-secondary: #605e5c;
            --accent-color: #0078d4;
            --user-color: #107c41;
            --border-color: #edebe9;
            --error-color: #a80000;
            --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        /* Overlay / Auth */
        #setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            width: 440px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border-radius: 4px;
        }

        .auth-box h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }

        .input-line {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.2rem;
            gap: 0.3rem;
        }

        .prompt {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 0;
        }

        input[type="text"],
        input[type="password"],
        select {
            background: var(--panel-bg);
            border: 1px solid #a19f9d;
            border-radius: 2px;
            padding: 0.4rem 0.6rem;
            color: var(--text-color);
            font-family: var(--font-sans);
            width: 100%;
            outline: none;
            font-size: 0.9rem;
            transition: border-color 0.15s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: var(--accent-color);
        }

        /* Set dropdown options */
        select option {
            background-color: var(--panel-bg);
            color: var(--text-color);
        }

        button.cmd-btn {
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 2px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            transition: background-color 0.15s ease;
        }

        button.cmd-btn:hover {
            background: #005a9e;
        }

        /* Console Layout */
        #main-console {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        header {
            padding: 0.6rem 1.2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        #reset-btn {
            background: transparent;
            color: var(--error-color);
            border: 1px solid var(--error-color);
            padding: 3px 10px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            border-radius: 2px;
            transition: all 0.15s ease;
        }

        #reset-btn:hover {
            background: var(--error-color);
            color: #ffffff;
        }

        #log-output {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background-color: var(--panel-bg);
        }

        .log-entry {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            color: var(--text-color);
            font-family: var(--font-sans);
        }

        .log-time {
            color: var(--text-secondary);
            margin-right: 0.6rem;
            font-size: 0.8rem;
        }

        .log-user {
            color: var(--user-color);
            font-weight: 600;
        }

        .log-sys {
            color: var(--accent-color);
            font-weight: 600;
        }

        footer {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--header-footer-bg);
        }

        .cmd-line {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #cmd-input {
            background: var(--panel-bg);
            border: 1px solid #d2d0ce;
            border-radius: 2px;
            padding: 0.5rem 0.8rem;
            color: var(--text-color);
            font-family: var(--font-sans);
            flex-grow: 1;
            outline: none;
            resize: none;
            height: 36px;
            min-height: 36px;
            line-height: 1.4;
            transition: border-color 0.15s ease;
        }

        #cmd-input:focus {
            border-color: var(--accent-color);
        }

        .hidden {
            display: none !important;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: var(--text-color);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .grounding-sources {
            margin-top: 0.6rem;
            padding-top: 0.6rem;
            border-top: 1px dashed var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .grounding-link {
            display: inline-block;
            margin-right: 1.2rem;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .grounding-link:hover {
            text-decoration: underline;
        }

        .grounding-title {
            font-weight: bold;
            display: block;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }

        .grounding-toggle-container {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .grounding-toggle-container input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* Subtle Thinking Indicator */
        .thinking {
            color: var(--text-secondary);
            animation: thinking-pulse 1s ease-in-out infinite;
        }

        @keyframes thinking-pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Stealth Auth Overlay -->
    <div id="setup-overlay">
        <div class="auth-box">
            <h2>> SYSTEM CONFIGURATION</h2>
            <div class="input-line">
                <span class="prompt">SET API_KEY=</span>
                <input type="password" id="api-key" placeholder="Enter key...">
            </div>
            <div class="input-line">
                <span class="prompt">SET TARGET</span>
                <select id="model-select">
                    <option value="gemini-3.5-flash">3.5f</option>
                    <option value="gemini-3-flash-preview">3f</option>
                    <option value="gemini-3.1-pro-preview">3.1p</option>
                </select>
            </div>
            <div class="input-line">
                <span class="prompt">SET PROXY_URL=</span>
                <input type="text" id="proxy-url" placeholder="(optional) https://your-worker.workers.dev">
            </div>
            <div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:1rem;"> proxy未設定=直接接続 / 設定時=プロキシ経由
            </div>
            <button id="start-btn" class="cmd-btn">EXECUTE BOOT SEQUENCE</button>
        </div>
    </div>

    <!-- Terminal Interface -->
    <main id="main-console" class="hidden">
        <header>
            <span>CONSOLE v3.1.0-preview</span>
            <button id="reset-btn">[RESET HISTORY]</button>
            <span id="header-model">Target: -</span>
            <span id="status">STATUS: ONLINE</span>
        </header>

        <section id="log-output">
            <div class="log-entry"><span class="log-time">[20:00:00]</span><span class="log-sys">[SYSTEM]</span> Kernel
                loaded. Awaiting input...</div>
        </section>

        <footer>
            <div class="cmd-line">
                <span class="prompt">></span>
                <textarea id="cmd-input" placeholder="Input command..."></textarea>
                <div class="grounding-toggle-container">
                    <input type="checkbox" id="grounding-toggle" checked>
                    <label for="grounding-toggle">SRCH</label>
                </div>
            </div>
        </footer>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let genAI, model, chatSession;
        let currentAPIKey, currentModelName;
        // プロキシモード用変数
        let proxyBaseURL = null;  // 設定されている場合のみ有効
        let proxyHistory = [];    // プロキシモード時の会話履歴

        const setupOverlay = document.getElementById('setup-overlay');
        const mainConsole = document.getElementById('main-console');
        const apiKeyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const proxyUrlInput = document.getElementById('proxy-url');
        const groundingToggle = document.getElementById('grounding-toggle');
        const startBtn = document.getElementById('start-btn');
        const logOutput = document.getElementById('log-output');
        const cmdInput = document.getElementById('cmd-input');
        const hdrModel = document.getElementById('header-model');
        const resetBtn = document.getElementById('reset-btn');

        startBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            if (!key) return alert('API_KEY is required.');

            const selModel = modelSelect.value;
            const proxyRaw = proxyUrlInput.value.trim().replace(/\/$/, '');

            try {
                currentAPIKey = key;
                currentModelName = selModel;

                if (proxyRaw) {
                    // --- プロキシモード ---
                    proxyBaseURL = proxyRaw;
                    proxyHistory = [];
                    // 疎通確認: proxyを通してpingに相当するリクエスト
                    const pingRes = await geminiProxyFetch('ping', false);
                    if (!pingRes) throw new Error('Proxy connection failed');
                    setupOverlay.classList.add('hidden');
                    mainConsole.classList.remove('hidden');
                    hdrModel.textContent = `Target: ${selModel} [PROXY]`;
                    apiKeyInput.value = '';
                } else {
                    // --- 直接接続モード ---
                    proxyBaseURL = null;
                    genAI = new GoogleGenerativeAI(key);
                    model = genAI.getGenerativeModel({ model: selModel });
                    const res = await model.generateContent('ping');
                    if (res) {
                        chatSession = model.startChat({ history: [] });
                        setupOverlay.classList.add('hidden');
                        mainConsole.classList.remove('hidden');
                        hdrModel.textContent = `Target: ${selModel}`;
                        apiKeyInput.value = '';
                    }
                }
            } catch (e) {
                alert('BOOT FAILED: ' + e.message);
            }
        });

        /**
         * プロキシ経由でGemini REST APIを呼び出す（非ストリーミング）
         * @param {string} userText - ユーザー入力
         * @param {boolean} useGrounding - グラウンディング有無
         * @returns {string} - AIの返答テキスト
         */
        async function geminiProxyFetch(userText, useGrounding) {
            const model = currentModelName;
            // APIキーをURLから削除
            const url = `${proxyBaseURL}/v1/v1beta/models/${model}:generateContent`;

            // 会話履歴をcontents形式に変換
            const contents = [
                ...proxyHistory,
                { role: 'user', parts: [{ text: userText }] }
            ];

            const body = { contents };
            if (useGrounding) {
                body.tools = [{ google_search: {} }];
            }

            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': currentAPIKey // ヘッダーに格納
                },
                body: JSON.stringify(body),
            });

            if (!res.ok) {
                const errText = await res.text();
                const err = new Error(`API Error ${res.status}: ${errText}`);
                err.status = res.status;
                throw err;
            }

            const data = await res.json();
            const candidate = data.candidates?.[0];
            const replyText = candidate?.content?.parts?.map(p => p.text).join('') ?? '';

            // 履歴に追加
            proxyHistory.push({ role: 'user', parts: [{ text: userText }] });
            proxyHistory.push({ role: 'model', parts: [{ text: replyText }] });

            // groundingMetadata があれば返す
            const groundingMeta = candidate?.groundingMetadata ?? null;

            return { text: replyText, groundingMetadata: groundingMeta };
        }

        async function execCommand() {
            const text = cmdInput.value.trim();
            if (!text || (!chatSession && !proxyBaseURL)) return;

            appendLog('user', text);
            cmdInput.value = '';
            cmdInput.style.height = '36px';

            const useGrounding = groundingToggle.checked;
            const logEntry = appendLog('sys', '. . .');
            logEntry.classList.add('thinking');

            try {
                if (proxyBaseURL) {
                    // === プロキシモード ===
                    const result = await retryWithBackoff(
                        async () => await geminiProxyFetch(text, useGrounding),
                        5,
                        1000
                    );
                    logEntry.classList.remove('thinking');
                    logEntry.textContent = result.text;
                    logOutput.scrollTop = logOutput.scrollHeight;

                    // groundingMetadata の表示
                    if (result.groundingMetadata?.groundingChunks) {
                        const sourcesDiv = document.createElement('div');
                        sourcesDiv.className = 'grounding-sources';
                        sourcesDiv.innerHTML = '<span class="grounding-title">[SOURCES]</span>';
                        const uniqueLinks = new Map();
                        result.groundingMetadata.groundingChunks.forEach(chunk => {
                            if (chunk.web?.uri) uniqueLinks.set(chunk.web.uri, chunk.web.title || chunk.web.uri);
                        });
                        uniqueLinks.forEach((title, uri) => {
                            const link = document.createElement('a');
                            link.href = uri; link.target = '_blank';
                            link.className = 'grounding-link';
                            link.textContent = `> ${title}`;
                            sourcesDiv.appendChild(link);
                        });
                        if (uniqueLinks.size > 0) {
                            logEntry.parentElement.appendChild(sourcesDiv);
                            logOutput.scrollTop = logOutput.scrollHeight;
                        }
                    }
                } else {
                    // === 直接接続モード (ストリーミング) ===
                    const history = await chatSession.getHistory();
                    const modelConfig = { model: currentModelName };
                    if (useGrounding) modelConfig.tools = [{ googleSearch: {} }];
                    model = genAI.getGenerativeModel(modelConfig);
                    chatSession = model.startChat({ history });

                    const result = await retryWithBackoff(
                        async () => await chatSession.sendMessageStream(text),
                        5,
                        1000
                    );
                    let full = '';
                    for await (const chunk of result.stream) {
                        const chunkText = chunk.text();
                        if (chunkText) {
                            if (full === '') {
                                logEntry.classList.remove('thinking');
                                logEntry.textContent = '';
                            }
                            full += chunkText;
                            logEntry.textContent = full;
                            logOutput.scrollTop = logOutput.scrollHeight;
                        }
                    }
                    try {
                        const response = await result.response;
                        if (response.groundingMetadata?.groundingChunks) {
                            const sourcesDiv = document.createElement('div');
                            sourcesDiv.className = 'grounding-sources';
                            sourcesDiv.innerHTML = '<span class="grounding-title">[SOURCES]</span>';
                            const uniqueLinks = new Map();
                            response.groundingMetadata.groundingChunks.forEach(chunk => {
                                if (chunk.web?.uri) uniqueLinks.set(chunk.web.uri, chunk.web.title || chunk.web.uri);
                            });
                            uniqueLinks.forEach((title, uri) => {
                                const link = document.createElement('a');
                                link.href = uri; link.target = '_blank';
                                link.className = 'grounding-link';
                                link.textContent = `> ${title}`;
                                sourcesDiv.appendChild(link);
                            });
                            if (uniqueLinks.size > 0) {
                                logEntry.parentElement.appendChild(sourcesDiv);
                                logOutput.scrollTop = logOutput.scrollHeight;
                            }
                        }
                    } catch (err) { console.error('Grounding metadata error:', err); }
                }
            } catch (e) {
                logEntry.classList.remove('thinking');
                logEntry.textContent = `[ERROR] ${e.message}`;
                logEntry.style.color = '#f85149';
            }
        }

        resetBtn.addEventListener('click', () => {
            if (!confirm('Clear all conversation history and reset session?')) return;

            logOutput.innerHTML = `<div class="log-entry"><span class="log-time">[${getTime()}]</span><span class="log-sys">[SYSTEM]</span> Kernel reset. History purged.</div>`;

            if (proxyBaseURL) {
                // プロキシモード: 履歴のみリセット
                proxyHistory = [];
            } else {
                // 直接接続モード: SDKセッションリセット
                const useGrounding = groundingToggle.checked;
                const modelConfig = { model: currentModelName };
                if (useGrounding) modelConfig.tools = [{ googleSearch: {} }];
                model = genAI.getGenerativeModel(modelConfig);
                chatSession = model.startChat({ history: [] });
            }
        });

        function appendLog(role, text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = getTime();
            const roleLabel = role === 'user' ? 'INPUT' : 'OUTPUT';
            const roleClass = role === 'user' ? 'log-user' : 'log-sys';

            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="${roleClass}">[${roleLabel}]</span> <span class="log-content">${text}</span>`;

            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;
            return entry.querySelector('.log-content');
        }

        function appendSystemWarning(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = getTime();
            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-sys" style="color:var(--error-color);">[SYSTEM]</span> <span style="color:var(--text-secondary);">${text}</span>`;
            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function isRetryableError(error) {
            const status = error.status || (error.message && error.message.match(/status (?:code )?(\d+)/)?.[1]);
            const msg = (error.message || "").toLowerCase();

            if (status) {
                const statusCode = parseInt(status, 10);
                // 429 (Too Many Requests), 5xx (Server Errors) はリトライ可能
                return statusCode === 429 || (statusCode >= 500 && statusCode < 600);
            }

            if (msg.includes("503") || msg.includes("504") || msg.includes("429") || 
                msg.includes("service unavailable") || msg.includes("resource exhausted") ||
                msg.includes("rate limit") || msg.includes("overloaded") || 
                msg.includes("failed to fetch") || msg.includes("network error") ||
                msg.includes("user agent is offline")) {
                return true;
            }

            if (error instanceof TypeError && msg.includes("fetch")) {
                return true;
            }

            return false;
        }

        async function retryWithBackoff(fn, maxRetries = 5, baseDelay = 1000) {
            let attempt = 0;
            while (true) {
                try {
                    return await fn();
                } catch (error) {
                    attempt++;
                    const retryable = isRetryableError(error);
                    
                    if (attempt > maxRetries || !retryable) {
                        throw error;
                    }
                    
                    const delay = baseDelay * Math.pow(2, attempt - 1) + Math.random() * 1000;
                    const sec = (delay / 1000).toFixed(1);
                    const status = error.status || "";
                    const statusStr = status ? ` (${status})` : "";
                    
                    appendSystemWarning(`Connection interrupted${statusStr}. Retrying in ${sec}s... (attempt ${attempt}/${maxRetries})`);
                    
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        function getTime() {
            return new Date().toLocaleTimeString('ja-JP', { hour12: false });
        }

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                execCommand();
            }
        });

        cmdInput.addEventListener('input', () => {
            cmdInput.style.height = 'auto';
            cmdInput.style.height = Math.min(cmdInput.scrollHeight, 200) + 'px';
        });
    </script>
</body>

</html>
